<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTweet Dashboard</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; }
      .app-container { padding: 20px; }
      .app-header { background: #1e3a8a; color: white; padding: 15px; margin-bottom: 20px; }
      .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .charts, .tweet-stream { background: #f8f9fa; padding: 15px; border-radius: 5px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
