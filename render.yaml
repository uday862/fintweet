services:
  # ─── 1. Node.js Backend (FREE) ──────────────────────────────────────────────
  - type: web
    name: fintweet-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false

  # ─── 2. React Frontend (FREE Static Site) ───────────────────────────────────
  - type: web
    name: fintweet-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_BASE
        sync: false
      - key: REACT_APP_FLASK_URL
        value: http://localhost:5001   # Flask runs locally during demo
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# NOTE: Flask ML server (TensorFlow+PyTorch+FinBERT) requires 2GB+ RAM
# which exceeds Render's free tier. Run it locally with: python app.py

